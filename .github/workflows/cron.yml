name: Monthly Cron Job

on:
  schedule:
    - cron: '0 12 1,15,30 * *' # Runs at 12:00 UTC on the 1st of every month
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  cron:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cron API
        run: |
          curl -X POST "${{ secrets.CRON_URL }}?secret=${{ secrets.CRON_SECRET }}"